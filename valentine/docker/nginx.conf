# nginx.conf — Valentine's Day Website
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Include default mime.types, then add missing media types
    include mime.types;
    types {
        image/jpeg jpg jpeg;
        image/png png;
        image/gif gif;
        audio/mpeg mp3;
        audio/ogg ogg;
        audio/wav wav;
        video/mp4 mp4;
        video/webm webm;
    }

    # Explicitly serve assets folder (photos, music, videos)
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # Serve all static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for other static assets
    location ~* \.(jpg|jpeg|png|webp|gif|mp4|mp3|svg|ico|woff2|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # No caching for HTML and JS (so updates are instant)
    location ~* \.(html|js|css)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Enable gzip for text files
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/css
        text/javascript
        text/xml
        text/plain
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Gzip compression level
    gzip_comp_level 6;

    # Disable gzip for old browsers
    gzip_disable "msie6";

    # Client max body size (for any future forms)
    client_max_body_size 10M;
}